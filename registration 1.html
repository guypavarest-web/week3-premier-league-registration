<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premier League Ticket Registration</title>
</head>
<body>

  <header>
    <h1>Premier League Match Registration</h1>
    <p>Please fill in the form below to register for match tickets.</p>
    <nav>
      <a href="#">Home</a> | <a href="#">Matches</a> | <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <form action="#" method="post">
      
      <!-- Section 1: Personal Details -->
      <fieldset>
        <legend>Personal Details</legend>

        <!-- Field 1: text -->
        <p>
          <label for="fullname">Full Name:</label><br>
          <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
        </p>

        <!-- Field 2: email -->
        <p>
          <label for="email">Email Address:</label><br>
          <input type="email" id="email" name="email" placeholder="john@example.com" required>
        </p>

        <!-- Field 3: tel (Input type ที่ 3) -->
        <p>
          <label for="phone">Phone Number:</label><br>
          <input type="tel" id="phone" name="phone" placeholder="0812345678" pattern="[0-9]{10}" required>
        </p>

        <!-- Field 4: number (Input type ที่ 4) -->
        <p>
          <label for="age">Age:</label><br>
          <input type="number" id="age" name="age" min="18" max="99" required>
        </p>
      </fieldset>

      <!-- Section 2: Match Selection -->
      <fieldset>
        <legend>Match Selection</legend>

        <!-- Field 5: select -->
        <p>
          <label for="match">Select Match:</label><br>
          <select id="match" name="match" required>
            <option value="">-- Please select a match --</option>
            <option value="arsenal-chelsea">Arsenal vs Chelsea</option>
            <option value="manutd-liverpool">Manchester United vs Liverpool</option>
            <option value="mancity-spurs">Manchester City vs Tottenham Hotspur</option>
          </select>
        </p>

        <!-- Field 6: number -->
        <p>
          <label for="tickets">Number of Tickets:</label><br>
          <input type="number" id="tickets" name="tickets" min="1" max="4" value="1" required>
        </p>
      </fieldset>

      <br>
      <button type="submit">Register Tickets</button>

    </form>
  </main>

  <footer>
    <p>&copy; 2026 Premier League Ticket Registration</p>
  </footer>

</body>
</html>
